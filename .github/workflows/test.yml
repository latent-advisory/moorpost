name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: go test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: cli/go.sum

      # Linux keychain backend (libsecret) — the claude-code agent's
      # keychain.New() probes for `secret-tool` on PATH. Without this,
      # any test that touches loadProjectContext (e.g.
      # TestLoadProjectContextWalksUp) fails with
      # "keychain: native backend unavailable: secret-tool not found".
      # Production Linux installs of moorpost have this package; CI
      # should mirror that environment.
      - name: Install libsecret-tools (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsecret-tools

      - name: Vet
        working-directory: cli
        run: go vet ./...

      - name: Test (race detector)
        working-directory: cli
        run: go test -race -timeout 5m ./...

      - name: Coverage report
        working-directory: cli
        run: |
          go test -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -1

  build-cross:
    name: cross-compile sanity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: cli/go.sum
      - name: Build all release targets
        run: make release
      - name: List artifacts
        run: ls -la dist/
